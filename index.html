<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, minimal-ui">
    <title>Lights Out: RMU Blackout VR</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
    
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-environment-component@1.3.3/dist/aframe-environment-component.min.js"></script>
    <!-- Font for 3D Text -->
    <link rel="stylesheet" href="styles.css">
    <script src="scenes.js"></script>
    <!-- Javascript Logic -->
    <script src="game.js" defer></script>
</head>

<body>

    <!-- 2D UI PRE-GAME -->
    <div id="intro-dialogue" class="fullscreen-overlay">
        <p>There is a sudden blackout...</p>
    </div>

    <div id="title-screen" class="fullscreen-overlay hidden">
        <div class="title-content">
            <h1 class="main-title">LIGHTS OUT</h1>
            <h2 class="sub-title">RMU CAMPUS BLACKOUT VR</h2>
            <button id="venture-btn" class="pulse-btn">ENTER VR</button>
            <p class="credits">Created by Gideon Gyamfi</p>
        </div>
    </div>
    
    <div id="transition-overlay" class="fullscreen-overlay hidden" style="z-index: 9999;">
        <div class="mission-box">
            <h1 id="transition-title"></h1>
            <p id="transition-text"></p>
            <div id="transition-cursor" class="blinking-cursor">_</div>
        </div>
        <button id="start-btn" class="hidden">INITIALIZE</button>
    </div>

    <!-- 3D VR GAME CONTAINER -->
    <div id="game-container" class="hidden">
        <a-scene id="vr-scene" background="color: black" cursor="rayOrigin: mouse" raycaster="objects: .clickable">
            
            <a-assets id="scene-assets">
                <!-- Assets will be injected here by JS -->
            </a-assets>
            
            <!-- Rig for Camera and Controllers -->
            <a-entity id="rig" position="0 0 0">
                <a-camera id="camera" wasd-controls-enabled="false" look-controls>
                    <!-- Gaze Cursor for VR (fallback for non-controller VR like cardboard) -->
                    <a-entity cursor="fuse: true; fuseTimeout: 1000"
                              position="0 0 -1"
                              geometry="primitive: ring; radiusInner: 0.02; radiusOuter: 0.03"
                              material="color: #00ff00; shader: flat"
                              scale="0.5 0.5 0.5"
                              raycaster="objects: .clickable"
                              visible="false">
                    </a-entity>

                    <!-- HUD Elements - centered in view -->
                    <a-entity id="hud-fragments" position="0 0.3 -0.8" text="value: 0/0 Fragments; color: #33ff33; align: center; width: 1.5"></a-entity>

                    <a-entity id="hud-enter-code" class="clickable hidden-aframe" position="0 -0.1 -1.8" geometry="primitive: box; width: 0.95; height: 0.16; depth: 0.04" material="color: #111; shader: flat; side: double" visible="false">
                        <a-entity id="hud-enter-code-label"
                                  position="0 0 0.03"
                                  text="value: ENTER CODE; color: #33ff33; align: center; width: 1.8; wrapCount: 14">
                        </a-entity>
                    </a-entity>
                    
                    
                    <!-- No head-mounted flashlight — only the hand controller has the beam -->
                    
                    <!-- HUD Onboarding Text (auto-fading, no interaction needed) -->
                    <a-entity id="hud-onboarding" position="0 -0.6 -5" visible="false">
                        <!-- Background box -->
                        <a-entity geometry="primitive: plane; width: 4.5; height: 1"
                                  material="color: #000; opacity: 0.85; shader: flat"
                                  position="0 0 -0.01"></a-entity>
                        <!-- Text overlay -->
                        <a-entity id="hud-onboarding-text"
                                  text="value: ; color: #33ff33; align: center; width: 6; wrapCount: 45"
                                  position="0 0 0"></a-entity>
                    </a-entity>
                </a-camera>

                <!-- VR Tracked Controllers -->
                <a-entity laser-controls="hand: left"
                          cursor="rayOrigin: entity"
                          raycaster="objects: .clickable; showLine: true; far: 20"></a-entity>
                <a-entity id="right-controller"
                          laser-controls="hand: right"
                          cursor="rayOrigin: entity"
                          raycaster="objects: .clickable; showLine: true; far: 20">
                    <!-- Flashlight Body (cosmetic) — negative Z = forward/away from user -->
                    <a-cylinder radius="0.025" height="0.2" color="#222" position="0 0 -0.08" rotation="90 0 0"
                                material="metalness: 0.8; roughness: 0.3; color: #333; shader: standard"></a-cylinder>
                    <!-- Flashlight Head (cosmetic) -->
                    <a-cylinder radius="0.035" height="0.04" color="#555" position="0 0 -0.17" rotation="90 0 0"
                                material="metalness: 0.9; roughness: 0.2; color: #444; shader: standard"></a-cylinder>
                    <!-- Flashlight Lens Glow (cosmetic) — faces forward -->
                    <a-circle radius="0.03" position="0 0 -0.19" rotation="0 180 0"
                              material="color: #fffde8; shader: flat; opacity: 0.6"></a-circle>
                    <!-- VR Controller Spotlight -->
                    <a-entity light="type: spot; intensity: 5.0; distance: 25; angle: 30; penumbra: 0.4; color: #fffde8; decay: 1.5"
                              position="0 -0.05 0" rotation="-10 0 0"></a-entity>
                </a-entity>
            </a-entity>
            
            <!-- ZERO ambient light — pitch black without flashlight -->
            <a-entity light="type: ambient; intensity: 0; color: #000"></a-entity>

            <!--
              Environment Sphere: A custom inverted sphere at radius 15.
              The default <a-sky> has radius 500 which is WAY too far for spotlights to reach.
              By using radius 15, the spotlight beam can physically illuminate the texture.
              side: back renders the inside of the sphere. color: #ffffff ensures texture shows at full brightness when lit.
            -->
            <a-entity id="environment-sky"
                      geometry="primitive: sphere; radius: 15; segmentsWidth: 64; segmentsHeight: 64"
                      material="shader: standard; color: #ffffff; metalness: 0; roughness: 1; side: back; src: ">
            </a-entity>

            <!-- Dynamic Entity Container (Fragments, Hotspots, Modals) -->
            <a-entity id="world-objects"></a-entity>

        </a-scene>
    </div>

</body>
</html>
